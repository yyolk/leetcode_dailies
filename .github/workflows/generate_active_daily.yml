# This workflow handles the daily upkeep of the repo, including checking in new boilerplate for the challenges

name: Generate Active Daily Every Day at 00:00 UTC

on:
  workflow_dispatch: ~
  schedule:
  # due to the high volume of requests github has for 00:00 (or every hour)
  # it's very unlikely that this will ever run before leetcode recognizes its a new day
  - cron: "0 0 * * *"

permissions:
  contents: write
  issues: write
  pull-requests: write

jobs:
  daily-upkeep:

    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v7
    - name: Set up Python
      uses: actions/setup-python@v6
      with:
        python-version-file: pyproject.toml
    - name: Set up uv
      uses: astral-sh/setup-uv@v7
      with:
        enable-cache: true
    - name: Install dependencies
      run: |
        uv sync --no-install-project
    - name: Generate Active Daily
      run: |
        uv run --no-sync python -m generate_active_daily
    - name: Generate Solution TOCs
      run: |
        uv run --no-sync python -m generate_calendar_toc
    - name: Format all .py files with ruff
      run: |
        uv run --no-sync ruff format .
    - name: Commit new files and open draft PR
      env:
        GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      run: |
        DAILY_DATE=$(date +'%Y%m%d')
        BRANCH="daily/${DAILY_DATE}"
        DAILY_LABEL="daily-boilerplate"
        DAILY_URL=$(uv run --no-sync python -m generate_active_daily --url)
        git config user.name 'github-actions[bot]'
        git config user.email 'github-actions[bot]@users.noreply.github.com'
        if git ls-remote --exit-code --heads origin "${BRANCH}"; then
          echo "Branch ${BRANCH} already exists, skipping PR creation."
          exit 0
        fi
        git checkout -b "${BRANCH}"
        git add .
        git commit --author "Joseph Chiocchi <joe@yolk.cc>" -m "Boilerplate for ${DAILY_DATE}

        ${DAILY_URL}
        "
        git push origin "${BRANCH}"
        gh label create "${DAILY_LABEL}" --description "Automated daily draft PRs" --color "1f6feb" || true
        gh pr create \
          --draft \
          --title "${DAILY_DATE}" \
          --body "${DAILY_URL}" \
          --label "${DAILY_LABEL}" \
          --base main \
          --head "${BRANCH}"
    - name: Notify of boilerplate ready
      if: always()
      env:
        PUSHOVER_TOKEN: ${{ secrets.PUSHOVER_API_KEY }}
        PUSHOVER_USER: ${{ secrets.PUSHOVER_USER_KEY }}
        JOB_STATUS: ${{ job.status }}
      run: |
        uv run --no-sync python -m notify_pushover
